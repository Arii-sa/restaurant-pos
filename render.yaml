services:
  - type: web
    name: restaurant-pos-api
    env: php
    rootDir: backend
    buildCommand: composer install --no-dev --optimize-autoloader && php artisan config:cache && php artisan route:cache
    startCommand: php artisan serve --host=0.0.0.0 --port=$PORT
    envVars:
      - key: APP_NAME
        value: "Restaurant POS"
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: false
      - key: APP_KEY
        generateValue: true
      - key: DB_CONNECTION
        value: pgsql
      - key: DB_URL
        fromDatabase:
          name: restaurant-pos-db
          property: connectionString
      - key: FRONTEND_URL
        value: https://restaurant-pos.vercel.app
      - key: SESSION_DRIVER
        value: cookie
      - key: CACHE_STORE
        value: array
      - key: LOG_LEVEL
        value: error

databases:
  - name: restaurant-pos-db
    databaseName: restaurant_pos
    user: pos_user
    plan: free
